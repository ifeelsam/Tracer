name: Release Gates

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  staging-smoke:
    name: Staging Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    env:
      STAGING_INGEST_URL: ${{ secrets.STAGING_INGEST_URL }}
      STAGING_SERVER_URL: ${{ secrets.STAGING_SERVER_URL }}
      STAGING_DASHBOARD_URL: ${{ secrets.STAGING_DASHBOARD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run staging smoke checks
        run: node scripts/smoke-staging.mjs
